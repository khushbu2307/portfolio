<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khushbu Upadhyay - Contact</title>
  <style>
    /* styles.css */

/* Reset default margin and padding */
body, h1, h2, h3, p, form {
  margin: 0;
  padding: 0;
}

/* Global styles */
body {
  font-family: 'Arial', sans-serif;
}

/* Header styles */
header {
  background-color: #333;
  color: #fff;
  padding: 1rem 0;
}

nav ul {
  list-style: none;
  display: flex;
  justify-content: center;
  padding: 0;
}

nav li {
  margin: 0 1rem;
}

nav a {
  text-decoration: none;
  color: #fff;
  font-weight: bold;
  transition: color 0.3s ease;
}

nav a:hover {
  color: #ff9900;
}

/* Contact section styles */
.contact-section {
  background-color: #000000;
  color: #ffffff;
  text-align: center;
  padding: 5rem 0;
}

.overlay {
  background-color: rgba(0, 0, 0, 0.5);
  padding: 2rem;
  border-radius: 10px;
}

.content h2 {
  font-size: 2.5rem;
  margin-bottom: 1rem;
}

.content p {
  font-size: 1.2rem;
  margin-bottom: 1rem;
}

.contact-form {
  margin-top: 2rem;
}

.contact-form form {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.contact-form input,
.contact-form textarea {
  padding: 0.5rem;
  margin: 0.5rem;
  width: 100%;
  border: 1px solid #ccc;
  border-radius: 5px;
}

.contact-form button {
  background-color: #ff9900;
  color: #fff;
  padding: 0.8rem 1.5rem;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
  transition: background-color 0.3s ease;
}

.contact-form button:hover {
  background-color: #ffcc33;
}

/* Footer styles */
footer {
  background-color: #000000;
  color: #fff;
  text-align: center;
  padding: 2rem 0;
}
#inp{
  width: 50%;
}
  </style>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="certificate.html">Certificates</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="Resume_Khushbu.pdf" download>Resume</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section id="contact" class="contact-section">
    <div class="overlay">
      <div class="content">
        <h2>Contact Me</h2>
        <p>If you have any questions, projects to discuss, or just want to say hello, feel free to get in touch with me. I'm always excited to connect!</p>
        <div class="contact-form">
          <form action="#" method="post">
            <input type="text" id="inp" name="name" placeholder="Your Name" required>
            <input type="email" id="inp" name="email" placeholder="Your Email" required>
            <textarea name="message" id="inp" placeholder="Your Message" rows="4" required></textarea>
            <button type="submit" class="cta-button">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2023 Upadhyay Khushbu. All rights reserved.</p>
  </footer>
</body>
</html>
